version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
      types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci

  - package-ecosystem: docker
    directory: /services/api-gateway
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /services/payment-service
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /services/wallet-service
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /services/ledger-service
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /services/notification-service
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
